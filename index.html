<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Historia ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

.background {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #1a0000, #000);
  z-index: -1;
}

.container {
  margin-top: 12vh;
  padding: 20px;
}

.screen {
  display: none;
  opacity: 0;
  transform: scale(0.9);
  transition: 0.5s;
}

.screen.active {
  display: block;
  opacity: 1;
  transform: scale(1);
}

button {
  padding: 14px 22px;
  margin: 10px;
  background: linear-gradient(45deg, #ff0055, #ff3385);
  border: none;
  border-radius: 12px;
  color: white;
}

.progress {
  width: 80%;
  height: 6px;
  background: #333;
  margin: auto;
  border-radius: 10px;
}

.progress-bar {
  height: 6px;
  width: 0%;
  background: #ff4d88;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="progress"><div id="bar" class="progress-bar"></div></div>

<div class="container" id="game"></div>

<audio id="music">
  <source src="count-on-me.mp3" type="audio/mpeg">
</audio>

<script>
let game = document.getElementById("game");
let bar = document.getElementById("bar");
let music = document.getElementById("music");

let nivel = 1;

// Historia
const niveles = [

"Hola mi niño… este no es un juego cualquiera ❤️",
"Hoy vas a recordar lo importante que eres 🥺",
"A veces dudas… pero yo nunca dudo de ti 💞",
"Has pasado cosas difíciles… y sigues aquí",
"Estoy orgulloso de ti, más de lo que crees",
"Si alguna vez te sientes solo… aquí estoy",
"No importa lo que pase… no te voy a soltar",
"Eres mi paz, incluso en mis días malos",
"Contigo todo se siente más fácil ❤️",
"Este es el final… pero también un comienzo 💫"
];

// Crear niveles
function renderNivel() {

  bar.style.width = (nivel * 10) + "%";

  game.innerHTML = `
    <div class="screen active">
      <h1>🎮 Nivel ${nivel}</h1>
      <p>${niveles[nivel-1]}</p>
      ${botonesNivel()}
    </div>
  `;
}

// Botones dinámicos
function botonesNivel() {

  if (nivel < 10) {
    return `
      <button onclick="decision()">Responder 💭</button>
      <button onclick="siguiente()">Continuar ➡️</button>
    `;
  } else {
    return `<button onclick="final()">Ver final ❤️</button>`;
  }
}

// Decisiones
function decision() {
  vibrar();

  const respuestas = [
    "Siempre voy a estar para ti 🫶",
    "Eres lo mejor que me ha pasado",
    "Nunca olvides lo increíble que eres",
    "No estás solo, nunca lo estarás",
    "Te amo muchísimo ❤️"
  ];

  alert(respuestas[Math.floor(Math.random() * respuestas.length)]);
}

// Siguiente nivel
function siguiente() {
  vibrar();
  nivel++;
  renderNivel();
}

// Final
function final() {
  vibrar();

  game.innerHTML = `
    <div class="screen active">
      <h1>🎂 FINAL ❤️</h1>
      <p>
      Llegaste hasta aquí… 🥺<br><br>
      Y aunque empezó como un juego…<br><br>
      Todo esto es real.<br><br>
      Eres mi niño, mi solecito ☀️<br>
      Mi cielo, mi mar y mi tierra 🌊🌎<br><br>
      Estoy contigo en todo.<br><br>
      Te amo muchísimo ❤️<br><br>
      Feliz cumpleaños 🎂
      </p>
    </div>
  `;
}

// Vibración
function vibrar() {
  if (navigator.vibrate) navigator.vibrate(40);
}

// Música al primer toque
document.body.addEventListener("click", () => {
  if (music.paused) music.play();
}, { once: true });

// Iniciar
renderNivel();
</script>

</body>
</html>
